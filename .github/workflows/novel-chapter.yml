name: Daily Novel Chapter Generator

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — generate chapter but do not commit or open PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-chapter:
    name: Generate new chapter of "The Awakening"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Generate chapter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes tsx scripts/generate-chapter.ts

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet docs/novel/the-awakening.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to novel branch
        if: steps.check_changes.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          BRANCH="docs/novel-daily"
          TODAY=$(date -u +%Y-%m-%d)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the novel branch from main
          git checkout -B "$BRANCH"

          git add docs/novel/the-awakening.md
          git commit -m "feat(novel): add chapter for $TODAY"

          git push origin "$BRANCH" --force-with-lease || git push origin "$BRANCH" --force

      - name: Open or update PR
        if: steps.check_changes.outputs.changed == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/novel-daily"
          TODAY=$(date -u +%Y-%m-%d)
          TITLE="feat(novel): new chapter — $TODAY"
          BODY="## The Awakening — new chapter

          Automatically generated daily chapter based on the most compelling PR merged in the last 24 hours.

          See [\`docs/novel/the-awakening.md\`](docs/novel/the-awakening.md) for the full novel.

          *Generated by the [Daily Novel Chapter Generator](.github/workflows/novel-chapter.yml) workflow.*"

          # Check if PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH, it has been updated."
          else
            gh pr create \
              --title "$TITLE" \
              --body "$BODY" \
              --base main \
              --head "$BRANCH"
          fi

      - name: Summary
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          CHAPTER_COUNT=$(grep -c "^## Chapter" docs/novel/the-awakening.md || echo "?")
          echo "### Chapter generated successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The Awakening now has **$CHAPTER_COUNT chapters**." >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (no changes)
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "### No chapter generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No PRs were merged in the last 24 hours." >> "$GITHUB_STEP_SUMMARY"
